name: Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  cargo-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: swatinem/rust-cache@v2
      
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            unzip \
            cmake \
            pkg-config \
            openssl \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libasound2-dev \
            ffmpeg \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswscale-dev \
            libswresample-dev \
            libpostproc-dev \
            gpac \
            libgpac-dev
      
      - run: cargo build

  ui-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      
      - run: cd ui && pnpm install
      
      - run: cd ui && pnpm run build
